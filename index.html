<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대원초등학교 급식 알리미</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#059669">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center p-4">

  <div class="w-full max-w-md bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mt-6">
    <div class="text-center mb-6">
      <span class="bg-emerald-50 text-emerald-700 text-xs px-3 py-1 rounded-full font-semibold">경상남도교육청</span>
      <h1 class="text-2xl font-bold text-slate-900 mt-2">🏫 창원대원초 급식</h1>
      <p class="text-xs text-slate-500 mt-1">매번 검색할 필요 없이 바로 확인하는 급식 메뉴</p>
    </div>
    
    <div class="bg-slate-50 p-3 rounded-xl mb-5 border border-slate-100">
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 text-center">조회 날짜 선택</label>
      <div class="flex items-center justify-between gap-2">
        <button onclick="changeDate(-1)" class="bg-white hover:bg-slate-100 text-slate-700 font-bold px-3 py-1.5 rounded-lg border border-slate-200 text-sm transition">◀ 이전날</button>
        <input type="date" id="dateInput" class="flex-1 bg-white px-2 py-1.5 border border-slate-200 rounded-lg text-center font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
        <button onclick="changeDate(1)" class="bg-white hover:bg-slate-100 text-slate-700 font-bold px-3 py-1.5 rounded-lg border border-slate-200 text-sm transition">다음날 ▶</button>
      </div>
    </div>
    
    <div id="mealResult" class="space-y-4">
      <p class="text-slate-400 text-center py-8 text-sm">급식 정보를 불러오는 중입니다...</p>
    </div>
  </div>

  <div class="w-full max-w-md text-center mt-6 text-xs text-slate-400">
    <p>© 대원초등학교 급식 알리미</p>
    <button id="installBtn" class="hidden mt-3 bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-emerald-700 transition shadow-sm w-full py-2.5">
      📱 홈 화면에 앱 설치하기
    </button>
  </div>

  <script>
    // [수정 완료] 창원대원초등학교 올바른 고유 코드 매핑
    const ATPT_OFCDC_SC_CODE = 'S10'; // 경남교육청
    const SD_SCHUL_CODE = '9211024';      // 창원대원초등학교 실제 표준학교코드
    const NEIS_API_KEY = ''; 

    // 한국 표준시 기준으로 정확하게 날짜 설정 (시차 버그 수정)
    const dateInput = document.getElementById('dateInput');
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const kstDate = new Date(utc + (9 * 60 * 60 * 1000));
    dateInput.value = kstDate.toISOString().substring(0, 10);

    function changeDate(days) {
      const currentVal = new Date(dateInput.value);
      if (!isNaN(currentVal.getTime())) {
        currentVal.setDate(currentVal.getDate() + days);
        dateInput.value = currentVal.toISOString().substring(0, 10);
        getMeal();
      }
    }

    dateInput.addEventListener('change', getMeal);

    async function getMeal() {
      const dateVal = dateInput.value.replace(/-/g, '');
      const resultDiv = document.getElementById('mealResult');
      resultDiv.innerHTML = '<p class="text-slate-400 text-center py-8 text-sm">급식 정보를 불러오는 중입니다...</p>';

      // 나이스 API는 규격상 대문자 'Type=json' 필수 요구
      let url = `https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${ATPT_OFCDC_SC_CODE}&SD_SCHUL_CODE=${SD_SCHUL_CODE}&MLSV_YMD=${dateVal}`;
      if (NEIS_API_KEY) url += `&KEY=${NEIS_API_KEY}`;

      try {
        const response = await fetch(url);
        const data = await response.json();
        
        resultDiv.innerHTML = '';
        
        // 데이터가 누락되었거나 에러코드가 반환된 경우 처리
        if (!data.mealServiceDietInfo) {
          resultDiv.innerHTML = `
            <div class="p-6 bg-amber-50/50 text-amber-700 rounded-2xl text-center border border-amber-100">
              <p class="text-2xl mb-1">🏖️</p>
              <p class="font-medium text-sm">해당 날짜에는 급식 정보가 없습니다.</p>
              <p class="text-xs text-amber-600/70 mt-0.5">주말, 공휴일 또는 방학 기간일 수 있습니다.</p>
            </div>`;
          return;
        }

        const meals = data.mealServiceDietInfo[1].row;
        meals.forEach(meal => {
          // 요리명 가공 및 알레르기 유발 식품 표시 번호 제거
          const cleanDish = meal.DDISH_NM.replace(/<br\s*\/?>/gi, '<br>').replace(/\([0-9.]+\)/g, '');
          
          const card = document.createElement('div');
          card.className = "p-5 bg-emerald-50/40 rounded-2xl border border-emerald-100/60";
          card.innerHTML = `
            <div class="flex justify-between items-center mb-3">
              <span class="bg-emerald-600 text-white text-xs px-2.5 py-1 rounded-md font-bold">${meal.MMEAL_SC_NM}</span>
              <span class="text-xs text-slate-500 font-medium bg-white px-2 py-0.5 rounded-full border border-slate-100">${meal.CAL_INFO}</span>
            </div>
            <p class="text-slate-700 leading-relaxed text-sm font-medium space-y-1">${cleanDish}</p>
          `;
          resultDiv.appendChild(card);
        });
      } catch (error) {
        resultDiv.innerHTML = `<p class="text-red-500 text-center py-8 text-sm">정보를 불러오지 못했습니다.<br><span class="text-xs text-slate-400">${error.message}</span></p>`;
      }
    }

    // 초기 실행
    getMeal();

    // 서비스 워커 등록 (PWA 세팅)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker 등록 완료:', reg.scope))
          .catch(err => console.log('Service Worker 등록 실패:', err));
      });
    }

    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          installBtn.classList.add('hidden');
        }
        deferredPrompt = null;
      }
    });
  </script>
</body>
</html>
